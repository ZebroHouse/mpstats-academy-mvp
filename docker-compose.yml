services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID}
        NEXT_PUBLIC_YANDEX_ID: ${NEXT_PUBLIC_YANDEX_ID}
        # Referral pay-gated (i2) copy. Empty = i1. Set to "true" (+ DB flag
        # referral_pay_gated=true) to go live with combat-mode referral.
        NEXT_PUBLIC_REFERRAL_PAY_GATED: ${NEXT_PUBLIC_REFERRAL_PAY_GATED:-}
        SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
        OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        # Needed at BUILD time so Edge middleware can read it (see Dockerfile note).
        # Prod-only — deliberately absent from docker-compose.staging.yml.
        REF_CLICK_SECRET: ${REF_CLICK_SECRET}
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      # Partner-courses section («Инструменты MPSTATS») — enabled on prod after owner
      # sign-off (Phase 62). Runtime flag — flip off by removing this line + up -d.
      PARTNER_COURSES_ENABLED: "true"
      # Partner seamless-entry endpoint (/api/partner/mpstats/enter) — opened for
      # partner testers 2026-07-01 (owner sign-off). IP rate-limited (PR #24). The
      # existing-user magic-link email needs the CarrotQuest pa_partner_magic_link
      # rule (see docs/partner/carrotquest-magic-link-rule-spec.md) — new emails and
      # already-logged-in users work without it. Flip off = remove this line + up -d.
      PARTNER_ENTRY_ENABLED: "true"
      # Cross-platform AI assistant (right drawer + /support concierge + material
      # surfacing). Enabled on prod after staging UAT sign-off 2026-07-14. Runtime
      # flag — flip off = remove this line + up -d (assistant code goes inert).
      ASSISTANT_ENABLED: "true"
      # Trial 2-for-1 offer engine (60-day first period for trial users).
      # LAUNCHED 2026-07-16 after staging UAT sign-off. Runtime flag — kill-switch
      # = flip to "false" + up -d (no rebuild), offer goes inert instantly.
      OFFER_ENABLED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
