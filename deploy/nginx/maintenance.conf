# ============================================================================
# MAAL — заглушка «технические работы» на время пересборки контейнера
# Вариант A: автоматическая. Nginx (на хосте VPS) отдаёт статичную страницу,
# когда апстрим-приложение недоступно (пересборка / рекриэйт / краш).
# Nginx живёт на хосте, поэтому переживает падение docker-контейнера.
# ============================================================================
#
# УСТАНОВКА (на проде — VPS 89.208.106.208, deploy@):
#
# 1. Положить страницу на хост (НЕ в контейнер):
#      sudo mkdir -p /var/www/maintenance
#      sudo cp deploy/maintenance/maintenance.html /var/www/maintenance/
#
# 2. В активном server{} для platform.mpstats.academy (обычно
#    /etc/nginx/sites-available/platform.mpstats.academy):
#
#    2a. ВНУТРЬ существующего `location / { ... proxy_pass http://127.0.0.1:3000; ... }`
#        добавить две строки:
#
#            proxy_intercept_errors on;
#            error_page 502 503 504 =503 /maintenance.html;
#
#    2b. РЯДОМ (в тот же server{}) добавить блок ниже (location = /maintenance.html).
#
# 3. Проверить и применить БЕЗ даунтайма:
#      sudo nginx -t && sudo nginx -s reload
#
# ОТКАТ: убрать 2 строки из `location /` + этот блок, затем `nginx -t && nginx -s reload`.
#
# ----------------------------------------------------------------------------

# Отдаём заглушку с диска хоста. `internal` — доступ только через error_page,
# напрямую по URL не открыть. =503 сохраняет корректный статус для мониторинга.
location = /maintenance.html {
    root /var/www/maintenance;
    internal;
    add_header Retry-After 300 always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    default_type text/html;
    charset utf-8;
}

# ----------------------------------------------------------------------------
# ЗАМЕТКИ
# - Страница самодостаточна (инлайн-CSS, без внешних CDN/шрифтов/картинок) —
#   поэтому рисуется, даже когда приложение и его /_next/static недоступны.
# - <meta http-equiv="refresh" content="30"> в HTML сам вернёт юзера на рабочий
#   сайт, как только контейнер поднимется.
# - proxy_intercept_errors перехватит ЛЮБОЙ 502/503/504 от апстрима, включая
#   реальные краши (это желаемо: лучше заглушка, чем голый Bad Gateway).
#   Приложение штатно эти коды не возвращает, ложных срабатываний не будет.
# - API-запросы (/api/*) во время полного даунтайма тоже получат эту страницу
#   с кодом 503 — приемлемо (весь апп всё равно лежит). Отдельно не разводим.
# ----------------------------------------------------------------------------
