# docker-compose.staging.yml — staging-стенд на VPS 89.208.106.208
# Запуск: docker compose -p maal-staging -f docker-compose.staging.yml up -d --build
# Останов: docker compose -p maal-staging -f docker-compose.staging.yml down
# ВАЖНО: всегда с -p maal-staging, иначе Docker может затронуть prod project

services:
  web:
    container_name: maal-staging-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Shared Supabase DB с prod (D-05), значения из .env.staging
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        # URL обязательно staging — используется в OAuth callback и NEXT_PUBLIC_SITE_URL
        NEXT_PUBLIC_SITE_URL: https://staging.platform.mpstats.academy
        NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID}
        NEXT_PUBLIC_YANDEX_ID: ${NEXT_PUBLIC_YANDEX_ID}
        # Referral pay-gated (i2) copy preview — pass NEXT_PUBLIC_REFERRAL_PAY_GATED=true
        # at build time to render i2 copy on staging (DB flag stays untouched → shared prod).
        NEXT_PUBLIC_REFERRAL_PAY_GATED: ${NEXT_PUBLIC_REFERRAL_PAY_GATED:-}
        SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
        OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        # Staging-only флаги — ОБЯЗАТЕЛЬНО хардкод, НЕ ${VAR} интерполяция.
        # Docker compose build-args через ${...} не надёжно пробрасывается в build-time
        # env для Next.js SWC инлайнинга — флаг получается empty и SHOW_LIBRARY не работает.
        # Новые фича-флаги: добавляй тут как literal "true"/"false".
        NEXT_PUBLIC_STAGING: "true"
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env.staging
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      # Partner-courses section («Инструменты MPSTATS») visible on staging for review.
      # Prod keeps this unset (off) until launch sign-off. Runtime flag — no rebuild to flip.
      PARTNER_COURSES_ENABLED: "true"
      # Internal /styleguide page visible on staging for design review.
      # Prod keeps this unset (404). Runtime flag — read server-side per request.
      STYLEGUIDE_ENABLED: "true"
      # Trial 2-for-1 offer — on for staging review (banner + pricing offer mode).
      # Prod ships dark ("false") until launch sign-off. Runtime flag, no rebuild.
      OFFER_ENABLED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
